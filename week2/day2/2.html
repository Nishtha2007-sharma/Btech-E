<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get values from HTML element</title>
</head>

<body>
    <div id="cont">hello world</div>
</body>

</html>

<script>
    // step -1 select/ catch the element
    const element = document.getElementById("cont");
    console.log(element);


    // step -2 read/ get values from el
    const data = element.innerText;
    console.log(data);

    // step -3 Write/update
    element.innerText = "welcome to DOM"

</script>
